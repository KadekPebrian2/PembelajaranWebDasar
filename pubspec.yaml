name: weblearn
description: Sistem Pembelajaran Web Dasar Berbasis Flutter & SQLite.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
  shared_preferences: ^2.2.2
  sqflite_common_ffi: ^2.4.0+3
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/Gambar1.png
    - assets/images/Gambar2.png
    - assets/images/html_logo.png
    - assets/images/css_logo.png
    - assets/images/js_logo.png